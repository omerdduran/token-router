name: build-variant

# Builds a ladder-rung image with baked env defaults and pushes it under a
# named tag. Verify locally / on the leaderboard, then promote-champion.
#
#   gh workflow run build-variant -f tag=rung1 -f local=true \
#     -f local_categories="math,code_gen,code_debug"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for this variant"
        required: true
      local:
        description: "DEFAULT_LOCAL (true/false)"
        default: "true"
        required: false
      local_categories:
        description: "DEFAULT_LOCAL_CATEGORIES (comma list, empty = all)"
        default: ""
        required: false
      workers:
        description: "DEFAULT_WORKERS"
        default: "4"
        required: false
      reasoning_effort:
        description: "DEFAULT_REASONING_EFFORT ('' = never send the param)"
        default: "none"
        required: false
      include_model:
        description: "INCLUDE_MODEL (false = weightless ~150MB diagnostic image)"
        default: "true"
        required: false
      sdk_mimic:
        description: "DEFAULT_SDK_MIMIC (true = OpenAI-SDK headers + HTTP/1.1)"
        default: "true"
        required: false
      prefix_cache:
        description: "DEFAULT_PREFIX_CACHE (false = no x-session-affinity header)"
        default: "true"
        required: false
      remote_caps:
        description: "DEFAULT_REMOTE_CAPS (false = omit max_tokens on remote)"
        default: "true"
        required: false
      probe:
        description: "DEFAULT_PROBE (true = diagnostic probe mode)"
        default: "false"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ inputs.tag }}
          build-args: |
            INCLUDE_MODEL=${{ inputs.include_model }}
            DEFAULT_LOCAL=${{ inputs.local }}
            DEFAULT_LOCAL_CATEGORIES=${{ inputs.local_categories }}
            DEFAULT_WORKERS=${{ inputs.workers }}
            DEFAULT_REASONING_EFFORT=${{ inputs.reasoning_effort }}
            DEFAULT_SDK_MIMIC=${{ inputs.sdk_mimic }}
            DEFAULT_PREFIX_CACHE=${{ inputs.prefix_cache }}
            DEFAULT_REMOTE_CAPS=${{ inputs.remote_caps }}
            DEFAULT_PROBE=${{ inputs.probe }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
