name: promote-champion

# Points the :champion tag — the one the submission form references — at a
# verified image. Only run this after an image has proven itself (local
# validation or a better leaderboard score). CI never touches :champion, so
# experimental pushes can never silently become the ranked submission.
#
#   gh workflow run promote-champion -f source=<full-commit-sha>
#   gh workflow run promote-champion -f source=latest   # promote current latest

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Existing image tag to promote (a commit SHA tag, or 'latest')"
        required: true

permissions:
  packages: write
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Retag source as champion
        run: |
          SRC="ghcr.io/${{ github.repository }}:${{ inputs.source }}"
          DST="ghcr.io/${{ github.repository }}:champion"
          echo "promoting $SRC -> $DST"
          docker buildx imagetools create -t "$DST" "$SRC"
          docker buildx imagetools inspect "$DST" | head -20
